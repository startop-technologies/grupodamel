<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Damel · Estrategia Canal Digital · Startop Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0C0C0F;
  --surface:     #141418;
  --surface2:    #1C1C22;
  --surface3:    #24242C;
  --orange:      #FF914D;
  --orange2:     #FFB380;
  --orange-dim:  #FF914D18;
  --orange-glow: #FF914D40;
  --teal:        #00C8C8;
  --teal-dim:    #00C8C810;
  --red:         #E05252;
  --red-dim:     #E0525215;
  --green:       #52C878;
  --green-dim:   #52C87815;
  --white:       #F0EFE8;
  --muted:       #6B6B7A;
  --border:      rgba(255,255,255,0.06);
  --border2:     rgba(255,255,255,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg); color: var(--white);
  font-family: 'DM Sans', sans-serif; font-weight: 400;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.5;
}

#deck { width: 100%; height: 100%; position: relative; }

.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  padding: 56px 80px;
  padding-bottom: 100px;
  opacity: 0;
  transform: translateX(60px);
  transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  overflow: hidden;
  background: var(--bg);
}
.slide.active { opacity: 1; transform: translateX(0); pointer-events: all; }
.slide.exit-left { opacity: 0; transform: translateX(-60px); transition: opacity 0.35s ease, transform 0.35s ease; }

/* NAV */
#nav {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 20px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 100px; padding: 10px 20px;
  z-index: 1000; backdrop-filter: blur(20px);
  opacity: 1; transition: opacity 0.4s ease;
}
#nav.hidden { opacity: 0; pointer-events: none; }
#nav button {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 18px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: color 0.2s, background 0.2s;
}
#nav button:hover { color: var(--white); background: var(--surface3); }
#nav button:disabled { opacity: 0.2; cursor: not-allowed; }
#slide-counter { font-family: 'DM Sans', monospace; font-size: 12px; color: var(--muted); min-width: 48px; text-align: center; letter-spacing: 0.08em; }
#dots { display: flex; gap: 6px; align-items: center; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface3); border: 1px solid var(--border2); cursor: pointer; transition: all 0.3s; }
.dot.active { background: var(--orange); border-color: var(--orange); width: 18px; border-radius: 3px; }

/* TOPBAR */
.topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.topbar-brand { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 12px; color: var(--orange); letter-spacing: 0.1em; text-transform: uppercase; }
.topbar-info { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

/* LABELS & TITLES */
.slide-label { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--orange); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px; opacity: 0.85; }
.slide-label.teal { color: var(--teal); }
.slide-label.muted { color: var(--muted); }
.slide-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: clamp(34px, 4vw, 54px); line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 28px; color: var(--white); }
.slide-title em { font-style: normal; color: var(--orange); }
.slide-title .teal { color: var(--teal); }

/* COVER */
.slide-cover { justify-content: center; background: radial-gradient(ellipse at 70% 40%, var(--orange-dim) 0%, transparent 60%), radial-gradient(ellipse at 20% 80%, #00C8C808 0%, transparent 50%); }
.cover-eyebrow { font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
.cover-line { width: 120px; height: 2px; background: linear-gradient(90deg, var(--orange), transparent); margin-bottom: 28px; }
.cover-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: clamp(52px, 7vw, 88px); line-height: 0.95; letter-spacing: -0.03em; margin-bottom: 28px; }
.cover-title .line1 { color: var(--white); display: block; }
.cover-title .line2 { color: var(--orange); display: block; }
.cover-desc { font-size: 15px; color: var(--muted); line-height: 1.7; max-width: 520px; margin-bottom: 48px; }
.cover-meta { display: flex; gap: 40px; align-items: center; }
.cover-meta-item { font-size: 13px; color: var(--muted); }
.cover-meta-item strong { color: var(--white); display: block; font-size: 14px; margin-bottom: 2px; }

/* CLOSE */
.slide-close { background: radial-gradient(ellipse at 50% 50%, var(--orange-dim) 0%, transparent 65%); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
.card.accent-left { border-left: 3px solid var(--orange); }
.card.teal-left { border-left: 3px solid var(--teal); }
.card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--orange); margin-bottom: 8px; font-family: 'DM Sans', sans-serif; }
.card-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 17px; color: var(--white); margin-bottom: 8px; }
.card-body { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* CALLOUT */
.callout { background: var(--orange-dim); border: 1px solid var(--orange-glow); border-left: 3px solid var(--orange); border-radius: 10px; padding: 18px 22px; margin-top: 14px; }
.callout.teal { background: var(--teal-dim); border-color: #00C8C830; border-left-color: var(--teal); }
.callout.red { background: var(--red-dim); border-color: var(--red); border-left-color: var(--red); }
.callout-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 12px; color: var(--orange); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.08em; }
.callout p { font-size: 13px; color: var(--white); line-height: 1.6; }
.callout strong { color: var(--orange); }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.kpi-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.kpi-value { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 30px; color: var(--white); margin-bottom: 4px; }
.kpi-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }
.kpi-box.accent { border-color: var(--orange); background: var(--orange-dim); }
.kpi-box.accent .kpi-value { color: var(--orange); }
.kpi-box.good { border-color: var(--green); background: var(--green-dim); }
.kpi-box.good .kpi-value { color: var(--green); }
.kpi-box.teal { border-color: var(--teal); background: var(--teal-dim); }
.kpi-box.teal .kpi-value { color: var(--teal); }

/* GRIDS */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; flex: 1; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; flex: 1; }

/* AUDIENCE CARDS */
.audience-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.audience-badge { display: inline-block; font-size: 10px; font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.12em; padding: 4px 10px; border-radius: 6px; margin-bottom: 4px; }
.audience-badge.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-glow); }
.audience-badge.teal { background: var(--teal-dim); color: var(--teal); border: 1px solid #00C8C830; }
.audience-name { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 22px; color: var(--white); }
.audience-tagline { font-size: 13px; color: var(--muted); line-height: 1.5; }
.audience-rows { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--border); padding-top: 12px; }
.audience-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid var(--border); }
.audience-row:last-child { border-bottom: none; }
.audience-row-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
.audience-row-val { font-size: 13px; color: var(--white); font-weight: 500; text-align: right; }
.trigger-box { background: var(--surface2); border-radius: 8px; padding: 12px 14px; border-left: 2px solid var(--orange); }
.t-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--orange); margin-bottom: 4px; }
.trigger-box p { font-size: 12px; color: var(--white); line-height: 1.5; }

/* FUNNEL */
.funnel { display: flex; flex-direction: column; gap: 0; flex: 1; }
.funnel-step { display: flex; align-items: stretch; gap: 20px; position: relative; }
.funnel-step:not(:last-child)::after { content: ''; position: absolute; left: 26px; bottom: -16px; width: 1px; height: 16px; background: var(--border2); }
.funnel-num { width: 52px; height: 52px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 18px; color: var(--orange); flex-shrink: 0; margin-top: 2px; }
.funnel-body { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
.funnel-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 15px; color: var(--white); margin-bottom: 4px; }
.funnel-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }
.funnel-tag { display: inline-block; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px; }
.funnel-tag.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-glow); }
.funnel-tag.teal { background: var(--teal-dim); color: var(--teal); }
.funnel-tag.green { background: var(--green-dim); color: var(--green); }

/* WA MESSAGE */
.wa-msg { background: #1A2F1D; border: 1px solid #2E5233; border-radius: 12px; border-bottom-left-radius: 3px; padding: 14px 18px; font-size: 13px; color: #A8D5AE; line-height: 1.6; margin: 10px 0; max-width: 90%; }

/* TIMELINE */
.timeline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; flex: 1; }
.tl-col-title { font-family: 'DM Sans', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.timeline { display: flex; flex-direction: column; gap: 0; }
.tl-item { display: grid; grid-template-columns: 90px 1fr; position: relative; }
.tl-item::before { content: ''; position: absolute; left: 90px; top: 0; bottom: 0; width: 1px; background: var(--border2); }
.tl-date { font-family: 'DM Sans', sans-serif; font-size: 10px; color: var(--muted); padding: 10px 12px 10px 0; text-align: right; line-height: 1.4; }
.tl-content { padding: 10px 0 10px 20px; position: relative; }
.tl-content::before { content: ''; position: absolute; left: -4px; top: 15px; width: 8px; height: 8px; border-radius: 50%; background: var(--surface3); border: 2px solid var(--border2); }
.tl-item.milestone .tl-content::before { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 0 4px var(--orange-dim); }
.tl-item.launch .tl-content::before { background: var(--teal); border-color: var(--teal); box-shadow: 0 0 0 4px var(--teal-dim); }
.tl-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 13px; color: var(--white); margin-bottom: 2px; }
.tl-desc { font-size: 11px; color: var(--muted); line-height: 1.5; max-width: 360px; }
.tl-tag { display: inline-block; font-family: 'DM Sans', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; padding: 2px 7px; border-radius: 4px; margin-bottom: 3px; }
.tl-tag.setup { background: var(--surface3); color: var(--muted); }
.tl-tag.on { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-glow); }
.tl-tag.hito { background: #00C8C815; color: var(--teal); border: 1px solid #00C8C820; }

/* METRIC TABLE */
.metric-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.metric-table th { text-align: left; padding: 9px 14px; font-family: 'DM Sans', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); border-bottom: 1px solid var(--border2); }
.metric-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--white); vertical-align: middle; }
.metric-table tr:last-child td { border-bottom: none; }
.metric-table tr:hover td { background: var(--surface2); }
.metric-table .hl { color: var(--orange); font-weight: 600; }
.metric-table .g { color: var(--green); }
.metric-table .m { color: var(--muted); font-size: 12px; }

/* PASO CARDS */
.paso-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.paso-num { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 900; font-size: 36px; color: var(--orange); opacity: 0.25; line-height: 1; margin-bottom: 6px; }
.paso-title { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 15px; color: var(--white); margin-bottom: 6px; }
.paso-body { font-size: 12px; color: var(--muted); line-height: 1.6; }
.paso-owner { display: inline-block; margin-top: 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; padding: 3px 9px; border-radius: 4px; background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-glow); }
.paso-owner.teal { background: var(--teal-dim); color: var(--teal); border-color: #00C8C830; }

/* AGENDA LIST */
.agenda-list { display: flex; flex-direction: column; gap: 10px; flex: 1; justify-content: center; }
.agenda-item { display: flex; align-items: center; gap: 20px; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.2s; }
.agenda-item:hover { border-color: var(--border2); }
.agenda-idx { font-family: 'DM Sans', monospace; font-size: 11px; color: var(--muted); width: 24px; flex-shrink: 0; }
.agenda-text { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 15px; color: var(--white); flex: 1; }
.agenda-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; padding: 3px 9px; border-radius: 4px; }
.agenda-label.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-glow); }
.agenda-label.teal { background: var(--teal-dim); color: var(--teal); }
.agenda-label.muted { background: var(--surface2); color: var(--muted); }

/* PERSON CARD */
.person-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; text-align: center; min-width: 160px; }
.person-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--orange-dim); border: 2px solid var(--orange-glow); display: flex; align-items: center; justify-content: center; font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 16px; color: var(--orange); margin: 0 auto 10px; }
.person-name { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 700; font-size: 14px; color: var(--white); margin-bottom: 3px; }
.person-role { font-size: 11px; color: var(--muted); }

/* CHANNEL PILL */
.channel-pill { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; }
.channel-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.channel-name { font-size: 13px; font-weight: 500; color: var(--white); flex: 1; }
.channel-budget { font-family: 'Cabinet Grotesk', sans-serif; font-weight: 800; font-size: 15px; color: var(--orange); }
</style>
</head>
<body>

<div id="deck"></div>

<div id="nav">

</div>

// ── ENGINE ───────────────────────────────────────────────────
const deck   = document.getElementById('deck');
const dotsEl = document.getElementById('dots');
const counter = document.getElementById('slide-counter');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
let current = 0;

function renderAll() {
  deck.innerHTML = slides.map((s, i) => {
    const html = s.render();
    return html.replace('<div class="slide', `<div class="slide" data-index="${i}"`);
  }).join('');
  dotsEl.innerHTML = slides.map((_, i) =>
    `<div class="dot ${i === 0 ? 'active' : ''}" data-i="${i}"></div>`
  ).join('');
  dotsEl.querySelectorAll('.dot').forEach(d => {
    d.addEventListener('click', () => goTo(+d.dataset.i));
  });
}

function goTo(idx) {
  if (idx < 0 || idx >= slides.length) return;
  const slideEls = deck.querySelectorAll('[data-index]');
  const prev = slideEls[current];
  if (prev) {
    prev.classList.remove('active');
    prev.classList.add('exit-left');
    setTimeout(() => prev.classList.remove('exit-left'), 400);
  }
  current = idx;
  const next = slideEls[current];
  if (next) {
    next.style.transform = 'translateX(60px)';
    next.offsetHeight;
    next.style.transform = '';
    next.classList.add('active');
  }
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  counter.textContent = `${current + 1} / ${slides.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === slides.length - 1;
}

prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(current - 1); }
});

// Nav auto-hide
const nav = document.getElementById('nav');
let hideTimer;
function showNav() {
  nav.classList.remove('hidden');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => nav.classList.add('hidden'), 2500);
}
document.addEventListener('mousemove', showNav);
document.addEventListener('click', showNav);

renderAll();
goTo(0);
</script>
